  <script>
    window.firePixelEvent = function(eventName, ecommerceData) {
      console.log("🚀 DataLayer Event Triggered: " + eventName, ecommerceData);

      // ১. GTM DataLayer Push (হুবহু আপনার স্ক্রিনশটের ফরম্যাট)
      window.dataLayer = window.dataLayer || [];
      window.dataLayer.push({ ecommerce: null }); // Clear previous ecommerce object
      window.dataLayer.push({
        'event': eventName,
        'ecommerce': {
          'items': ecommerceData.items,
          'currency': ecommerceData.currency,
          'value': ecommerceData.value
        }
      });

      // ২. Facebook Pixel (Smart Mapper)
      if(typeof fbq !== 'undefined') {
        let fbEvent = (eventName === 'purchase') ? 'Purchase' :
                      (eventName === 'begin_checkout') ? 'InitiateCheckout' :
                      (eventName === 'add_to_cart') ? 'AddToCart' :
                      (eventName === 'view_item') ? 'ViewContent' : eventName;

        let fbData = { value: ecommerceData.value, currency: ecommerceData.currency };
        if (ecommerceData.items && ecommerceData.items.length > 0) {
           fbData.content_name = ecommerceData.items.map(i => i.item_name).join(', ');
           fbData.content_ids = ecommerceData.items.map(i => i.item_id);
           fbData.content_type = 'product';
        }
        fbq('track', fbEvent, fbData);
      }

      // ৩. TikTok Pixel (Smart Mapper)
      if(typeof ttq !== 'undefined') {
        let ttEvent = (eventName === 'purchase') ? 'CompletePayment' :
                      (eventName === 'begin_checkout') ? 'InitiateCheckout' :
                      (eventName === 'add_to_cart') ? 'AddToCart' :
                      (eventName === 'view_item') ? 'ViewContent' : eventName;

        let ttData = { value: ecommerceData.value, currency: ecommerceData.currency };
        if (ecommerceData.items && ecommerceData.items.length > 0) {
           ttData.contents = ecommerceData.items.map(i => ({
               content_id: i.item_id,
               content_name: i.item_name,
               price: i.price,
               quantity: i.quantity
           }));
           ttData.content_type = 'product';
        }
        ttq.track(ttEvent, ttData);
      }
    };
  </script>

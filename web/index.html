  <script>
    window.firePixelEvent = function(eventName, eventData) {
      console.log("🚀 Tracking Event: " + eventName, eventData);

      // ১. ডাটা লেয়ার পুশ (গুগল ট্যাগ ম্যানেজার বা GTM এর জন্য)
      window.dataLayer = window.dataLayer || [];
      window.dataLayer.push({
        'event': eventName,
        'ecommerce': eventData // ই-কমার্স ডাটা থাকলে এখানে আসবে
      });

      // ২. ফেসবুক পিক্সেল (যদি GTM এর বাইরে আলাদাভাবে ট্র্যাক করতে চান)
      if(typeof fbq !== 'undefined') {
        let fbEvent = (eventName === 'purchase') ? 'Purchase' :
                      (eventName === 'begin_checkout') ? 'InitiateCheckout' :
                      (eventName === 'view_item') ? 'ViewContent' : eventName;
        fbq('track', fbEvent, eventData);
      }

      // ৩. টিকটক পিক্সেল (যদি GTM এর বাইরে আলাদাভাবে ট্র্যাক করতে চান)
      if(typeof ttq !== 'undefined') {
        let ttEvent = (eventName === 'purchase') ? 'CompletePayment' :
                      (eventName === 'begin_checkout') ? 'InitiateCheckout' :
                      (eventName === 'view_item') ? 'ViewContent' : eventName;
        ttq.track(ttEvent, eventData);
      }
    };
  </script>
